name: Kuiper2.0
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'

jobs:
  Build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        arch: [32, 64]
        build_type: [basic, full]
        include:
          - arch: 32
            build_type: basic
            os: ubuntu-24.04-arm
          - arch: 64
            build_type: basic
            os: ubuntu-24.04-arm
          - arch: 32
            build_type: full
            os: ubuntu-24.04-arm
          - arch: 64
            build_type: full
            os: ubuntu-24.04-arm
      fail-fast: false
    steps:
      - uses: actions/checkout@v3
      - name: Set env variabiles
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH=$GITHUB_BASE_REF
          else
            BRANCH=$GITHUB_REF_NAME
          fi
          branch_name=$(echo $BRANCH | tr 'a-z' 'A-Z' | sed 's/[^[:alnum:]]/_/g')
          type=$( echo ${{ matrix.build_type }} | tr 'a-z' 'A-Z')
          echo ARTIFACT_NAME=kuiper_"${{ matrix.build_type }}"_"${{ matrix.arch }}" >> $GITHUB_ENV
          echo BRANCH_NAME="$branch_name"_"$type"_"${{ matrix.arch }}" >> $GITHUB_ENV
      - name: Build image
        run: |
          if [[ "$(uname -m)" != "aarch64" ]]; then
            sudo apt-get update
            sudo apt-get install -y qemu-user-static
          fi
          # remove container if already exists
          CONTAINER_NAME=$(grep -m1 -oP '^[#]?CONTAINER_NAME=\K.*' ./config)
          if [ "$(docker ps -a -q -f name=^/${CONTAINER_NAME}$)" ]; then
              docker rm -fv "$CONTAINER_NAME"
          fi

          ci/modify_config.sh ./config "${{ vars[format('{0}', env.BRANCH_NAME )] }}"
          sudo bash build-docker.sh
          ls kuiper-volume/*.zip >/dev/null 2>&1 && exit 0 || exit 2
      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}_image
          path: ${{ github.workspace }}/kuiper-volume/*.zip
      - name: Upload meta
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}_meta
          path: |
            ${{ github.workspace }}/kuiper-volume
            !${{ github.workspace }}/kuiper-volume/*.zip

  Build_with_qemu:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        arch: [32, 64]
        build_type: [basic]
        include:
          - arch: 32
            build_type: basic
            os: ubuntu-latest
          - arch: 64
            build_type: basic
            os: ubuntu-latest
      fail-fast: false
    steps:
      - uses: actions/checkout@v3
      - name: Set env variabiles
        run: |
          BRANCH=$GITHUB_BASE_REF
          branch_name=$(echo $BRANCH | tr 'a-z' 'A-Z' | sed 's/[^[:alnum:]]/_/g')
          type=$( echo ${{ matrix.build_type }} | tr 'a-z' 'A-Z')
          echo BRANCH_NAME="$branch_name"_"$type"_"${{ matrix.arch }}" >> $GITHUB_ENV
      - name: Build image
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          ci/modify_config.sh ./config "${{ vars[format('{0}', env.BRANCH_NAME )] }}"
          sudo bash build-docker.sh
          ls kuiper-volume/*.zip >/dev/null 2>&1 && exit 0 || exit 2

  Trigger_workflow:
    needs: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      - name: Trigger docker build
        run: gh workflow run docker-image-build.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
